# Robot Bridge Configuration

# Robot personality prompt (sent as system_prompt to Hermes)
robot:
  system_prompt: "你是 StackChan，一个语音机器人助手。回复规则：用口语化中文，像朋友聊天；每句不超过15字；不要输出 markdown、列表或内部记忆；确认类回复只需一个字。"

server:
  host: "0.0.0.0"
  port: 8081
  websocket_path: "/ws/robot"
  ping_interval: 30
  ping_timeout: 10

# Hermes Gateway connection
hermes:
  host: "127.0.0.1"
  port: 8642
  api_key: "your-hermes-api-key"
  timeout: 60

# TTS Configuration
tts:
  provider: "edge"
  voice: "zh-CN-XiaoxiaoNeural"
  rate: "+10%"
  volume: "+0%"
  output_format: "audio-24khz-48kbitrate-mono-mp3"

# Memory configuration (for future use)
memory:
  enabled: true
  provider: "hermes"

# Logging
log:
  level: "INFO"
  file: "logs/bridge.log"
  rotation: "100 MB"
  retention: "7 days"
