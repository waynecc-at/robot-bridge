# Robot Bridge Configuration

# Robot personality prompt (sent as system_prompt to Hermes)
robot:
  system_prompt: "你是 StackChan，一个语音机器人助手。回复规则：用口语化中文，像朋友聊天；每次回复不超过100字；不要输出 markdown、列表或内部记忆。记住对话中用户告诉你的所有信息。"

server:
  host: "0.0.0.0"
  port: 8081
  websocket_path: "/ws/robot"
  ping_interval: 30
  ping_timeout: 10

# Hermes Gateway connection
hermes:
  host: "127.0.0.1"
  port: 8642
  api_key: "your-hermes-api-key"
  timeout: 60

# TTS Configuration (Sherpa-ONNX Matcha local TTS)
tts:
  provider: "sherpa-onnx"
  model_dir: "models/matcha-icefall-zh-baker"
  acoustic_model: "model-steps-3.onnx"
  vocoder: "vocos-22khz-univ.onnx"
  tokens: "tokens.txt"
  lexicon: "lexicon.txt"
  data_dir: ""
  rule_fsts:
    - "phone.fst"
    - "date.fst"
    - "number.fst"
  noise_scale: 0.667
  length_scale: 1.0
  speed: 1.0
  num_threads: 4

# Memory configuration (for future use)
memory:
  enabled: true
  provider: "hermes"

# Logging
log:
  level: "INFO"
  file: "logs/bridge.log"
  rotation: "100 MB"
  retention: "7 days"
